suite: TrivySecret

tests:
  - it: ExternalRedisExistingSecretDoesNotCreateInlineRedisUrlSecret
    set:
      redis:
        type: external
        external:
          existingSecret: redis-auth-secret
    template: templates/trivy/trivy-secret.yaml
    asserts:
      - notExists:
          path: data.redisURL
      - exists:
          path: data.gitHubToken

  - it: NonExistingSecretFlowKeepsInlineRedisUrlSecret
    set:
      redis:
        type: external
        external:
          existingSecret: ""
    template: templates/trivy/trivy-secret.yaml
    asserts:
      - exists:
          path: data.redisURL
